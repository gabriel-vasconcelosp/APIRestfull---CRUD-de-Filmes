services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: filmes_api
    environment:
      DATABASE_URL: sqlite:////app/data/filmes.db
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: filmes_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - app
    restart: unless-stopped
